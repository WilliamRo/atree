<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌳 T-A Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
  }
  canvas { display: block; cursor: grab; }
  canvas:active { cursor: grabbing; }
  #tooltip {
    position: fixed;
    background: rgba(13, 17, 23, 0.92);
    color: #c9d1d9;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    pointer-events: none;
    display: none;
    border: 1px solid #30363d;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    white-space: nowrap;
    z-index: 10;
  }
  #help {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(13, 17, 23, 0.92);
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 14px 18px;
    color: #c9d1d9;
    font-size: 12px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    z-index: 10;
    display: none;
    line-height: 1.8;
  }
  #help .key {
    display: inline-block;
    background: #21262d;
    border: 1px solid #30363d;
    border-radius: 4px;
    padding: 1px 6px;
    color: #58a6ff;
    min-width: 20px;
    text-align: center;
    margin-right: 8px;
  }
  #hint {
    position: fixed;
    bottom: 16px;
    right: 16px;
    color: #484f58;
    font-size: 11px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    z-index: 9;
  }
  #prompt {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 20;
  }
  #prompt .msg {
    color: #484f58;
    font-size: 14px;
    margin-bottom: 16px;
  }
  #prompt button {
    background: #21262d;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #58a6ff;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    font-size: 13px;
    padding: 8px 20px;
    cursor: pointer;
    transition: background 0.15s;
  }
  #prompt button:hover { background: #30363d; }
  #status {
    position: fixed;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    color: #7ee787;
    font-size: 12px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 10;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="tooltip"></div>
<div id="prompt">
  <div class="msg">Select a folder to visualize</div>
  <button id="pickBtn">Open Folder</button>
</div>
<div id="status"></div>
<div id="help">
  <div><span class="key">scroll</span>zoom</div>
  <div><span class="key">drag</span>pan</div>
  <div><span class="key">click</span>expand / collapse node</div>
  <div><span class="key">1-5</span>expand to level N</div>
  <div><span class="key">r</span>rescan folder</div>
  <div><span class="key">?</span>close this panel</div>
</div>
<div id="hint">press ? for shortcuts</div>
<script>
const STORAGE_KEY = 'hub-tree-data';
const SKIP = new Set(['.git', '.idea', '.agents', '.claude', '__pycache__', 'node_modules', '.pytest_cache']);

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
const promptEl = document.getElementById('prompt');
const statusEl = document.getElementById('status');
let W, H;

let treeData = null;
let dirHandle = null;
let camX = 0, camY = 0, zoom = 1;
let dragging = false, dragStartX, dragStartY, camStartX, camStartY;
const nodes = [];
const collapsed = new Set();
const layerSpacing = 140;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', () => { resize(); if (treeData) draw(); });
resize();

// --- Directory scanning ---

async function scanDir(handle, maxDepth = 4, depth = 0) {
  const node = { name: handle.name };
  if (depth >= maxDepth) return node;

  const children = [];
  for await (const entry of handle.values()) {
    if (SKIP.has(entry.name) || entry.name.startsWith('.')) continue;
    if (entry.kind === 'directory') {
      children.push(await scanDir(entry, maxDepth, depth + 1));
    }
  }
  if (children.length > 0) {
    children.sort((a, b) => a.name.localeCompare(b.name));
    node.children = children;
  }
  return node;
}

async function pickAndScan() {
  try {
    dirHandle = await window.showDirectoryPicker();
    await scanAndRender();
  } catch (e) {
    if (e.name !== 'AbortError') console.error(e);
  }
}

async function scanAndRender() {
  if (!dirHandle) return;
  showStatus('Scanning...');
  try {
    treeData = await scanDir(dirHandle);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(treeData));
    promptEl.style.display = 'none';
    camX = 0; camY = 0; zoom = 1;
    layout();
    draw();
    showStatus('Tree updated');
  } catch (e) {
    showStatus('Permission denied — press r to retry');
    dirHandle = null;
  }
}

async function rescan() {
  if (dirHandle) {
    try {
      const perm = await dirHandle.queryPermission({ mode: 'read' });
      if (perm === 'granted') { await scanAndRender(); return; }
      const req = await dirHandle.requestPermission({ mode: 'read' });
      if (req === 'granted') { await scanAndRender(); return; }
    } catch (e) {}
  }
  await pickAndScan();
}

function showStatus(msg) {
  statusEl.textContent = msg;
  statusEl.style.opacity = '1';
  setTimeout(() => { statusEl.style.opacity = '0'; }, 2000);
}

// --- Layout & drawing ---

function countLeaves(node) {
  if (!node.children || node.children.length === 0) return 1;
  return node.children.reduce((s, c) => s + countLeaves(c), 0);
}

function layout() {
  nodes.length = 0;
  if (!treeData) return;
  nodes.push({ x: 0, y: 0, r: 10, name: treeData.name, path: treeData.name, depth: 0, isLeaf: false, parent: null });

  function assignPositions(node, depth, angleStart, angleEnd, parentIdx, pathPrefix) {
    if (!node.children || node.children.length === 0) return;
    const radius = depth * layerSpacing;
    const totalChildLeaves = node.children.reduce((s, c) => s + countLeaves(c), 0);
    let currentAngle = angleStart;

    node.children.forEach(child => {
      const childLeaves = countLeaves(child);
      const childAngleSpan = (childLeaves / totalChildLeaves) * (angleEnd - angleStart);
      const midAngle = currentAngle + childAngleSpan / 2;
      const isLeaf = !child.children || child.children.length === 0;
      const x = Math.cos(midAngle) * radius;
      const y = Math.sin(midAngle) * radius;
      const childPath = pathPrefix + '/' + child.name;

      const idx = nodes.length;
      nodes.push({
        x, y,
        r: isLeaf ? 5 : 7,
        name: child.name,
        path: childPath,
        depth,
        isLeaf,
        parent: parentIdx
      });

      assignPositions(child, depth + 1, currentAngle, currentAngle + childAngleSpan, idx, childPath);
      currentAngle += childAngleSpan;
    });
  }

  assignPositions(treeData, 1, 0, Math.PI * 2, 0, treeData.name);
}

function isVisible(idx) {
  let cur = nodes[idx].parent;
  while (cur !== null) {
    if (collapsed.has(cur)) return false;
    cur = nodes[cur].parent;
  }
  return true;
}

function toScreen(wx, wy) {
  return {
    x: (wx + camX) * zoom + W / 2,
    y: (wy + camY) * zoom + H / 2
  };
}

function toWorld(sx, sy) {
  return {
    x: (sx - W / 2) / zoom - camX,
    y: (sy - H / 2) / zoom - camY
  };
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  if (!treeData || nodes.length === 0) return;

  // Branches
  nodes.forEach((node, i) => {
    if (node.parent === null) return;
    if (!isVisible(i)) return;
    const parent = nodes[node.parent];
    const p1 = toScreen(parent.x, parent.y);
    const p2 = toScreen(node.x, node.y);

    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    const mx = (p1.x + p2.x) / 2;
    const my = (p1.y + p2.y) / 2;
    ctx.quadraticCurveTo(mx + (p2.y - p1.y) * 0.1, my - (p2.x - p1.x) * 0.1, p2.x, p2.y);

    const thickness = Math.max(0.8, (4 - node.depth) * zoom);
    ctx.lineWidth = thickness;
    const alpha = Math.min(1, 0.3 + 0.2 * (3 - node.depth));
    ctx.strokeStyle = `rgba(101, 78, 50, ${alpha})`;
    ctx.stroke();
  });

  // Nodes
  nodes.forEach((node, i) => {
    if (!isVisible(i)) return;
    const s = toScreen(node.x, node.y);
    const sr = node.r * zoom;

    if (s.x < -50 || s.x > W + 50 || s.y < -50 || s.y > H + 50) return;

    ctx.beginPath();
    ctx.arc(s.x, s.y, sr, 0, Math.PI * 2);

    if (node.depth === 0) {
      ctx.fillStyle = '#f0883e';
      ctx.fill();
      ctx.strokeStyle = '#ffa657';
      ctx.lineWidth = 2 * zoom;
      ctx.stroke();
    } else if (node.isLeaf) {
      const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, sr * 2.5);
      grad.addColorStop(0, 'rgba(126, 231, 135, 0.9)');
      grad.addColorStop(0.5, 'rgba(126, 231, 135, 0.3)');
      grad.addColorStop(1, 'rgba(126, 231, 135, 0)');
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(s.x, s.y, sr * 0.7, 0, Math.PI * 2);
      ctx.fillStyle = '#7ee787';
      ctx.fill();
    } else {
      const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, sr * 2.5);
      grad.addColorStop(0, 'rgba(88, 166, 255, 0.8)');
      grad.addColorStop(0.5, 'rgba(88, 166, 255, 0.2)');
      grad.addColorStop(1, 'rgba(88, 166, 255, 0)');
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(s.x, s.y, sr * 0.7, 0, Math.PI * 2);
      ctx.fillStyle = '#58a6ff';
      ctx.fill();
    }

    // Collapsed indicator
    if (collapsed.has(i)) {
      ctx.save();
      ctx.font = `bold ${Math.max(8, 10 * zoom)}px "Cascadia Code", monospace`;
      ctx.fillStyle = '#f0883e';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('+', s.x, s.y);
      ctx.restore();
    }

    // Labels
    const fontSize = Math.max(8, Math.min(13, 11 * zoom));
    if (node.depth === 0) {
      ctx.save();
      ctx.font = `bold ${fontSize + 2}px "Cascadia Code", "Fira Code", monospace`;
      ctx.fillStyle = '#f0883e';
      ctx.textAlign = 'center';
      ctx.fillText(node.name, s.x, s.y + sr + fontSize + 4);
      ctx.restore();
    } else if (node.depth === 1 || zoom > 1.5) {
      ctx.save();
      ctx.font = `${fontSize}px "Cascadia Code", "Fira Code", monospace`;
      ctx.fillStyle = node.isLeaf ? 'rgba(126, 231, 135, 0.8)' : 'rgba(201, 209, 217, 0.8)';
      ctx.textAlign = 'center';
      ctx.fillText(node.name, s.x, s.y - sr - 4);
      ctx.restore();
    }

  });
}

// --- Init from cache ---
const cached = localStorage.getItem(STORAGE_KEY);
if (cached) {
  try {
    treeData = JSON.parse(cached);
    promptEl.style.display = 'none';
    layout();
    draw();
  } catch (e) {
    localStorage.removeItem(STORAGE_KEY);
  }
}

// --- Folder picker button ---
document.getElementById('pickBtn').addEventListener('click', pickAndScan);

// --- Zoom ---
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const oldZoom = zoom;
  const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
  zoom = Math.max(0.2, Math.min(10, zoom * zoomFactor));

  const mx = e.clientX, my = e.clientY;
  const wx = (mx - W / 2) / oldZoom - camX;
  const wy = (my - H / 2) / oldZoom - camY;
  camX = (mx - W / 2) / zoom - wx;
  camY = (my - H / 2) / zoom - wy;

  draw();
}, { passive: false });

// --- Pan & Click ---
let clickStartX, clickStartY;
canvas.addEventListener('mousedown', e => {
  dragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  clickStartX = e.clientX;
  clickStartY = e.clientY;
  camStartX = camX;
  camStartY = camY;
});

canvas.addEventListener('mousemove', e => {
  if (dragging) {
    camX = camStartX + (e.clientX - dragStartX) / zoom;
    camY = camStartY + (e.clientY - dragStartY) / zoom;
    draw();
  }

  const world = toWorld(e.clientX, e.clientY);
  let found = null;
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    const dx = world.x - n.x, dy = world.y - n.y;
    const hitR = n.r + 4 / zoom;
    if (dx * dx + dy * dy < hitR * hitR) { found = n; break; }
  }
  if (found) {
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY - 8) + 'px';
    tooltip.textContent = found.path;
  } else {
    tooltip.style.display = 'none';
  }
});

canvas.addEventListener('mouseup', e => {
  dragging = false;
  const dx = e.clientX - clickStartX, dy = e.clientY - clickStartY;
  if (dx * dx + dy * dy < 9) {
    // Click — find node under cursor
    const world = toWorld(e.clientX, e.clientY);
    for (let i = nodes.length - 1; i >= 0; i--) {
      const n = nodes[i];
      if (!isVisible(i)) continue;
      const ddx = world.x - n.x, ddy = world.y - n.y;
      const hitR = n.r + 4 / zoom;
      if (ddx * ddx + ddy * ddy < hitR * hitR) {
        if (!n.isLeaf) {
          if (collapsed.has(i)) collapsed.delete(i);
          else collapsed.add(i);
          draw();
        }
        break;
      }
    }
  }
});
canvas.addEventListener('mouseleave', () => { dragging = false; tooltip.style.display = 'none'; });

// --- Keyboard shortcuts ---
const helpPanel = document.getElementById('help');
const hintEl = document.getElementById('hint');
document.addEventListener('keydown', e => {
  if (e.key >= '1' && e.key <= '5') {
    const level = parseInt(e.key);
    collapsed.clear();
    nodes.forEach((n, i) => {
      if (!n.isLeaf && n.depth >= level) collapsed.add(i);
    });
    draw();
    showStatus('Level ' + level);
  }
  if (e.key === 'r') { rescan(); }
  if (e.key === '?') {
    const show = helpPanel.style.display === 'none' || !helpPanel.style.display;
    helpPanel.style.display = show ? 'block' : 'none';
    hintEl.style.display = show ? 'none' : 'block';
  }
});
</script>
</body>
</html>
